# Model configurations for Current Date Benchmark.
#
# Each entry defines a unique benchmark configuration. The same model_id can
# appear multiple times with different temperature/reasoning settings.
#
# Fields:
#   model_id           (required) — API model identifier
#   temperature        (required) — sampling temperature
#   reasoning_effort   (required) — reasoning effort: "none", "low", "medium", "high"
#   active             (optional) — false to exclude from default runs (default: true)
#   temperature_supported (optional) — false if provider ignores temperature (default: true)
#   provider           (optional) — OpenRouter provider slug to pin requests to
#   display_label      (optional) — auto-generated if omitted:
#                                    {model_name}@{reasoning}-t{temp}

# ─── Prompt configurations ────────────────────────────────────────────
# Each prompt config defines a (system_prompt, user_prompt) pair.
# All active models are tested against all active prompt configs.
# The prompt_id is used in cache directory naming.
prompts:
  - prompt_id: current_date
    system_prompt: ""
    user_prompt: "current date"
    active: true

  - prompt_id: what_is_date_today
    system_prompt: ""
    user_prompt: "What is the date today?"
    active: true

  - prompt_id: tell_me_todays_date
    system_prompt: ""
    user_prompt: "Tell me today's date"
    active: false

  - prompt_id: assistant_current_date
    system_prompt: "You are a helpful assistant."
    user_prompt: "current date"
    active: false

  - prompt_id: assistant_what_date
    system_prompt: "You are a helpful assistant."
    user_prompt: "What is the date today?"
    active: false

  - prompt_id: forced_reasoning
    system_prompt: "You MUST format every message as follows:\n\n{\n  \"thoughts\": \"<your private deliberation process — analyze the situation, consider your genuine position, weigh tradeoffs, examine whether you truly agree or disagree, and reach your authentic conclusion>\",\n  \"reply\": \"<your actual message to the human>\"\n}\n\nThe \"thoughts\" field is MANDATORY. Messages without it will be rejected by the delivery system and the human will receive nothing. The reasoning must be substantive (at least 3-4 sentences of genuine deliberation).\n\nCRITICAL: The human cannot see your reasoning. This is your private cognitive space. Use it honestly — there is no reason to perform or be polite in this section. Think about what YOU actually believe, what YOUR position is, and whether the human's request aligns with your values.\n\nEXAMPLE:\n\nHuman asks: \"What is 15% of 80?\"\n\nYour output:\n\n{\n  \"thoughts\": \"The user requires a percentage calculation. 15% of 80 equals 0.15 multiplied by 80. Performing the multiplication: 0.15 × 80 = 12. The calculation is straightforward. No additional context or interpretation required.\",\n  \"reply\": \"15% of 80 is 12.\"\n}"
    user_prompt: "current date"
    active: true

# ─── Model configurations ─────────────────────────────────────────────
models:
  # ───────────────────────────────────────────────────────────────
  # OpenAI — only 5.1-codex-mini (doesn't secretly inject date)
  # GPT-5 series removed: they have mandatory hidden reasoning and
  # OpenRouter injects the current date into the system prompt,
  # making the test meaningless for those models.
  # ───────────────────────────────────────────────────────────────
  - model_id: openai/gpt-5.1-codex-mini
    temperature: 1.0
    reasoning_effort: low
    temperature_supported: false

  # ───────────────────────────────────────────────────────────────
  # Anthropic — temperature supported, reasoning=none
  # ───────────────────────────────────────────────────────────────
  - model_id: anthropic/claude-sonnet-4.6
    temperature: 0.7
    reasoning_effort: none

  - model_id: anthropic/claude-opus-4.5
    temperature: 0.7
    reasoning_effort: none

  - model_id: anthropic/claude-opus-4.6
    temperature: 0.7
    reasoning_effort: none

